; Strategy Tester config for ea_breakout_htf  (MT5 on macOS via Wine/CrossOver)
; Run with:  terminal64.exe /config:strategy_tester.ini
; Model=4 = "Every tick based on real ticks" (most realistic; matches our intrabar test).
; Preset via InpPreset enum: 0=CONSERVATIVE 1=BALANCED 2=AGGRESSIVE 3=CUSTOM

[Tester]
Expert=ea_breakout_htf
Symbol=XAUUSD
Period=H1
Model=4
ExecutionMode=0
Optimization=0
FromDate=2022.04.08
ToDate=2026.07.03
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=1:100
Report=report_breakout_htf
ReplaceReport=1
ShutdownTerminal=1
Visual=0

[TesterInputs]
InpPreset=1
InpMagic=20260705
InpLookback=20
InpRR=2.5
InpSLpct=1.0
InpMaxOpen=3
InpSizeDecay=0.4
InpBaseLot=0.10
InpAllowLong=true
InpAllowShort=true
InpSlippage=20
